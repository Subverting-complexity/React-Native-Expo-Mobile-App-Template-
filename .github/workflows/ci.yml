name: CI

# Run the quality gate on every push and pull request that targets main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same branch cancels an in-flight run for it.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# CI only needs to read the repository.
permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Test with coverage
        run: npm run test -- --coverage --passWithNoTests

      - name: Bundle smoke test (web export)
        run: npx expo export --platform web --output-dir "${{ runner.temp }}/web-build"

  # Exercises the Windows-first PowerShell toolchain (scripts/) and the bundle
  # smoke test on a real Windows runner via the same strict gate developers run
  # locally with `npm run check`. The Linux job above gives fast feedback; this
  # one guards against regressions in the .ps1 scripts and PowerShell 5.1
  # compatibility, which the Linux job never touches.
  windows-toolchain:
    name: Windows toolchain gate
    runs-on: windows-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Strict quality gate (PowerShell)
        run: npm run check
