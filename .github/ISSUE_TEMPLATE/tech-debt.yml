name: Tech Debt
description: Code quality, maintainability, or cleanup work
title: '[DEBT] '
labels: ['type-debt']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What the debt is and why it matters now.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed fix
      description: How you would address it.
    validations:
      required: false
